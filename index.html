<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PetBVL</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-4">

    <!-- HEADER -->
    <header class="text-center mb-4">
        <h1>🐾 PetBVL</h1>
        <p id="dataHora"></p>
    </header>

    <!-- CARROSSEL -->
    <div id="carouselExample" class="carousel slide mb-4" data-bs-ride="carousel">
        <div class="carousel-inner">

            <div class="carousel-item active">
                <img src="img/pet1.jpg" class="d-block w-100" alt="Pet 1">
            </div>

            <div class="carousel-item">
                <img src="img/pet2.jpg" class="d-block w-100" alt="Pet 2">
            </div>

            <div class="carousel-item">
                <img src="img/pet3.jpg" class="d-block w-100" alt="Pet 3">
            </div>

        </div>

        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>

        <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>

    <!-- FORMULÁRIO -->
    <form class="p-4 bg-light rounded shadow">

        <!-- CLIENTE -->
        <h4>Dados do Cliente</h4>

        <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Endereço</label>
            <input type="text" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">CPF</label>
            <input type="text" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Telefone</label>
            <input type="tel" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">E-mail</label>
            <input type="email" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Sexo:</label><br>
            <input type="radio" name="sexo"> Masculino
            <input type="radio" name="sexo"> Feminino
        </div>

        <!-- PET -->
        <h4>Dados do Pet</h4>

        <div class="mb-3">
            <label class="form-label">Nome do Pet</label>
            <input type="text" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Raça</label>
            <input type="text" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Idade</label>
            <input type="number" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Porte</label>
            <select class="form-select">
                <option>Pequeno</option>
                <option>Médio</option>
                <option>Grande</option>
            </select>
        </div>

        <!-- SERVIÇOS -->
        <h4>Serviços</h4>

        <div class="mb-3">
            <input type="checkbox"> Banho
            <input type="checkbox"> Tosa
            <input type="checkbox"> Consulta
        </div>

        <!-- AGENDAMENTO -->
        <h4>Agendamento</h4>

        <div class="mb-3">
            <input type="radio" name="metodo"> Tele-busca
            <input type="radio" name="metodo"> Entrega no local
        </div>

        <div class="mb-3">
            <label>Data</label>
            <input type="date" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Hora</label>
            <input type="time" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Observações</label>
            <textarea class="form-control"></textarea>
        </div>

        <button class="btn btn-success w-100">Agendar</button>

    </form>

</div>

<script src="script.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
